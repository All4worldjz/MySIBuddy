# Vagrant 测试环境 inventory
# 用法: ansible-playbook playbooks/deploy.yml -i test/vagrant/inventory.ini

[vagrant_test]
default ansible_host=127.0.0.1 ansible_port=2222 ansible_user=vagrant ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key

[vagrant_test:vars]
# 降低资源检查阈值（Vagrant VM 默认 2C/4GB/~40GB）
min_memory_mb=2048
min_cpu_cores=1
min_disk_gb=10

# 测试环境禁用某些加固（避免影响 Vagrant 连接）
security_hardening:
  ssh:
    disable_root_login: true
    disable_password_auth: false  # 保留密码认证，防止锁死
    max_auth_tries: 5
  firewall:
    enabled: true
    ssh_port: 22
  fail2ban:
    enabled: true
    ssh_max_retries: 10  # 更宽松
    ssh_ban_time: 600    # 10 分钟
    ssh_find_time: 600
  swap:
    enabled: true
    size_gb: 2  # 测试环境 2GB swap 即可
  auto_updates:
    enabled: false  # 测试环境不自动更新

# 确认 SSH 加固（Vagrant 使用密钥连接，可以安全加固）
confirm_ssh_hardening: false
