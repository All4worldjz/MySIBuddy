# Docker 测试环境 inventory
# 用法: ansible-playbook playbooks/deploy.yml -i test/docker/inventory.ini -c local

[docker_test]
localhost ansible_connection=local ansible_user=root

[docker_test:vars]
# 降低资源检查阈值（容器资源有限）
min_memory_mb=512
min_cpu_cores=1
min_disk_gb=5

# 容器环境禁用不兼容的加固项
security_hardening:
  ssh:
    disable_root_login: false   # 容器需要 root
    disable_password_auth: false  # 不禁用密码认证
    max_auth_tries: 10
    allow_tcp_forwarding: true
  firewall:
    enabled: false  # 容器中 UFW 不可用
  fail2ban:
    enabled: false  # 容器中 fail2ban 需要 iptables
  swap:
    enabled: false  # 容器无 swap
  auto_updates:
    enabled: false

# 跳过 SSH 加固确认
confirm_ssh_hardening: false

# 跳过 NTP 配置（容器中 chrony 可能无法启动）
# 在 system-prep 中跳过 chrony（通过标签控制）
