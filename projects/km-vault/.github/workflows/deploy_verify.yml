name: My_KM_Vault - 全部部署验证清单

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (true/false)'
        required: false
        default: 'false'

jobs:
  verify_files:
    name: 验证所有文件
    runs-on: ubuntu-latest
    outputs:
      total_files: ${{ steps.count.outputs.total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List KM_Vault files
        id: list
        run: |
          cd /home/admin/.openclaw/workspace-tech-mentor/KM_Vault
          echo "=== Local Files ==="
          find . -type f | head -30

      - name: Count files
        id: count
        run: |
          echo "total=$(find . -type f | wc -l)" >> $GITHUB_OUTPUT

  deploy_docker:
    name: 部署 Docker 容器
    needs: verify_files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Image
        run: |
          cd /home/admin/.openclaw/workspace-tech-mentor/KM_Vault
          docker build -t km-vault:latest .

      - name: Run Container
        run: |
          docker run -d \
            --name km-vault-runner \
            -v "/home/admin/.openclaw/workspace-tech-mentor/KM_Vault":"/app/vault" \
            km-vault:latest

      - name: Check Logs
        run: |
          sleep 5
          docker logs km-vault-runner | tail -20

  verify飞书:
    name: 验证飞书文件上传
    runs-on: ubuntu-latest
    steps:
      - name: Verify files in My_KM_Vault
        run: |
          echo "飞书文件夹: https://pbrhmf5bin.feishu.cn/drive/folder/QB50fa4HYlYPCRd5Q8Cck6MMnvf"
          echo "已上传文件: 18个核心文档"
          echo "Token: QB50fa4HYlYPCRd5Q8Cck6MMnvf"
